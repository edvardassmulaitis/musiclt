name: News scout

# 2x per para: 05:00 UTC (07:00 EET ryto digest), 17:00 UTC (19:00 EET vakaro digest).
# Matrix strategy: 8 paraleliai jobs (po vieną per source_id), max 4 concurrent —
# Vercel Hobby plan'as turi ~60s function timeout, ne batch'u.
on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 EET
    - cron: '0 17 * * *'  # 19:00 EET
  workflow_dispatch:
    inputs:
      source_id:
        description: "Konkretus source_id (palik tuscia visam batchui)"
        required: false
        type: string
      dry_run:
        description: "Dry run (jokio inserto)"
        required: false
        type: boolean
        default: false

jobs:
  run-scout:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false   # vieno source'o klaida nesustabdo kitų
      max-parallel: 4    # neperkrauname Anthropic API rate limit'o
      matrix:
        source_id: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - name: Call news-scout for source ${{ matrix.source_id }}
        # Skip jei dispatch'as nurodė konkretu source_id ir šitas matrix entry yra kitoks
        if: ${{ !inputs.source_id || inputs.source_id == matrix.source_id }}
        run: |
          QUERY="?source_id=${{ matrix.source_id }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            QUERY="${QUERY}&dry_run=1"
          fi

          echo "Calling: ${{ secrets.MUSICLT_BASE_URL }}/api/internal/news-scout/run${QUERY}"
          response=$(curl -sS -w "\n%{http_code}" \
            -X POST "${{ secrets.MUSICLT_BASE_URL }}/api/internal/news-scout/run${QUERY}" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_CRON_TOKEN }}" \
            --max-time 75)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP $http_code"
          echo "$body" | head -c 3000
          echo

          if [ "$http_code" != "200" ]; then
            echo "::error::source ${{ matrix.source_id }} returned non-200"
            exit 1
          fi

          inserted=$(echo "$body" | grep -oP '"total_candidates_inserted":\K\d+' || echo "?")
          errors=$(echo "$body" | grep -oP '"total_errors":\K\d+' || echo "?")
          echo "::notice::source ${{ matrix.source_id }} → inserted: $inserted | errors: $errors"

  summary:
    needs: run-scout
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Run finished
        run: echo "✓ News scout run completed (8 source jobs paraleliai, see individual results above)"
