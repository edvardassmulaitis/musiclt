name: Events scout

# 2x per parą (2026-05-16 cost optimization: 3x/d → 2x/d). Events keičiasi
# lėtai (bilietai atsiranda dienomis, ne valandomis) — 12h latency OK.
#   08:00 UTC (10:00 EET ryto) | 20:00 UTC (22:00 EET vakaro)
on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      source_id:
        description: "Konkretus source_id (palik tuscia visam batchui)"
        required: false
        type: string
      dry_run:
        description: "Dry run (jokio inserto)"
        required: false
        type: boolean
        default: false

jobs:
  run-events:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      max-parallel: 2    # Anthropic API rate limit safety
      matrix:
        # IDs iš migracijos 20260515a — bilietai.lt(9), tiketa.lt(10), kakava.lt(11)
        source_id: [9, 10, 11]
    steps:
      - name: Call events-scout for source ${{ matrix.source_id }}
        if: ${{ !inputs.source_id || inputs.source_id == matrix.source_id }}
        run: |
          QUERY="?source_id=${{ matrix.source_id }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            QUERY="${QUERY}&dry_run=1"
          fi

          echo "Calling: ${{ secrets.MUSICLT_BASE_URL }}/api/internal/events-scout/run${QUERY}"
          response=$(curl -sS -w "\n%{http_code}" \
            -X POST "${{ secrets.MUSICLT_BASE_URL }}/api/internal/events-scout/run${QUERY}" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_CRON_TOKEN }}" \
            --max-time 65)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP $http_code"
          echo "$body" | head -c 3000
          echo

          if [ "$http_code" != "200" ]; then
            echo "::error::events source ${{ matrix.source_id }} returned non-200"
            exit 1
          fi

          inserted=$(echo "$body" | grep -oP '"total_inserted":\K\d+' || echo "?")
          not_music=$(echo "$body" | grep -oP '"total_not_music":\K\d+' || echo "?")
          errors=$(echo "$body" | grep -oP '"total_errors":\K\d+' || echo "?")
          skipped=$(echo "$body" | grep -oP '"skipped":"\K[^"]+' || echo "")
          if [ -n "$skipped" ]; then
            echo "::notice::events source ${{ matrix.source_id }} → SKIPPED ($skipped)"
          else
            echo "::notice::events source ${{ matrix.source_id }} → inserted: $inserted | filter'inta: $not_music | errors: $errors"
          fi
